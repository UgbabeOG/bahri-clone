<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#003366" />
  
  <!-- Stylized Cargo/Tanker Ship and Waves -->
  <g fill="#FFFFFF">
    <!-- Waves at the bottom -->
    <path d="M100 350 Q 178 320 256 350 T 412 350 L 412 410 L 100 410 Z" opacity="0.3" />
    <path d="M80 375 Q 168 345 256 375 T 432 375 L 432 430 L 80 430 Z" />
    
    <!-- Ship Hull -->
    <path d="M120 330 L 392 330 L 362 260 L 150 260 Z" />
    
    <!-- Superstructure / Bridge -->
    <rect x="300" y="190" width="50" height="70" rx="4" />
    
    <!-- Radar & Antenna Mast -->
    <line x1="325" y1="190" x2="325" y2="160" stroke="#FFFFFF" stroke-width="4" />
    <line x1="315" y1="170" x2="335" y2="170" stroke="#FFFFFF" stroke-width="4" />
    
    <!-- Funnel / Smoke Stack -->
    <rect x="335" y="150" width="12" height="40" />
    <path d="M333 150 L 349 150 L 345 142 L 333 142 Z" fill="#FFCC00" />
    
    <!-- Cargo Deck Tanks (Oil/Gas Tanker style to fit NexaCrude theme) -->
    <path d="M165 260 C 165 235, 210 235, 210 260 Z" fill="#EAEAEA" />
    <path d="M225 260 C 225 235, 270 235, 270 260 Z" fill="#EAEAEA" />
    
    <!-- Deck Pipes (Tanker detail) -->
    <line x1="150" y1="258" x2="295" y2="258" stroke="#FFFFFF" stroke-width="4" />
  </g>
  
  <!-- Global Ring / Orbit representing global transit -->
  <circle cx="256" cy="256" r="215" stroke="#FFCC00" stroke-width="8" fill="none" opacity="0.9" />
</svg>